<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Audio từ JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f4f4;
        }
        .container {
            max-width: 700px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            margin: 10px 5px;
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
        .info { margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Test Audio từ JSON</h1>
        <p><strong>Video ID:</strong> <span id="videoId">-</span></p>
        
        <div class="info">
            <strong>Tiêu đề:</strong> <span id="title">-</span><br>
            <strong>Đường dẫn audio:</strong> <span id="audioPath">-</span>
        </div>

        <button onclick="loadAndPlay()">▶️ Load JSON & Phát Nhạc</button>
        <button onclick="stopAudio()">⏹️ Dừng</button>

        <audio id="audioPlayer" controls></audio>

        <pre id="log" style="margin-top:20px; background:#eee; padding:10px; border-radius:5px;"></pre>
    </div>

    <script>
        const videoId = "YykjpeuMNEk";  // ← Thay ID nếu cần
        const jsonPath = `storage/jsonmusic/${videoId}.json`;

        let audio = document.getElementById('audioPlayer');

        function log(message) {
            document.getElementById('log').textContent += message + "\n";
        }

        async function loadAndPlay() {
            try {
                log("Đang đọc file JSON...");
                
                const response = await fetch(jsonPath);
                if (!response.ok) throw new Error("Không tìm thấy file JSON");

                const data = await response.json();
                
                document.getElementById('videoId').textContent = data.id || videoId;
                document.getElementById('title').textContent = data.title || "Không có tiêu đề";
                document.getElementById('audioPath').textContent = data.audio_path || data.audio_full_path || "Không có";

                const audioUrl = data.audio_location;
                
                if (!audioUrl) {
                    log("❌ Không tìm thấy đường dẫn audio trong JSON");
                    return;
                }

                log(`✅ Đang load audio: ${audioUrl}`);
                
                audio.src = audioUrl;
                audio.load();
                audio.play().then(() => {
                    log("▶️ Đang phát nhạc...");
                }).catch(err => {
                    log("❌ Lỗi phát nhạc: " + err.message);
                });

            } catch (error) {
                log("❌ Lỗi: " + error.message);
                console.error(error);
            }
        }

        function stopAudio() {
            audio.pause();
            audio.currentTime = 0;
            log("⏹️ Đã dừng phát nhạc.");
        }

        // Tự động load khi mở trang
        window.onload = () => {
            log("Trang đã sẵn sàng. Nhấn nút để test.");
        };
    </script>
</body>
</html>
